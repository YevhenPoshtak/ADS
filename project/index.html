<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ternary Search Tree (Trie with BST of children)</title>
  <meta name="description"
    content="Інтерактивна візуалізація алгоритмів Ternary Search Tree: вставка, пошук, видалення, обходи дерева." />
  <style>
    /* ══════════════════════ RESET ══════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ══════════════════════ PALETTE ══════════════════════ */
    :root {
      /* Classic algo-vis greens */
      --hdr-bg: #4a5e1a;
      /* dark olive header/footer */
      --hdr-title: #e8b400;
      /* golden yellow title */
      --toolbar-bg: #c8d89a;
      /* light olive toolbar */
      --toolbar-bdr: #8fa840;
      /* toolbar border */
      --canvas-bg: #ffffff;
      /* white canvas */
      --canvas-bdr: #b0b890;
      /* canvas border */
      --footer-bg: #4a5e1a;
      --footer-link: #5ba3e0;
      /* blue link in footer */

      /* Sidebar (kept subtle) */
      --sb-bg: #f2f5e8;
      --sb-bdr: #c0cc90;
      --sb-title: #3a4a10;
      --sb-text: #3a4010;

      /* Inputs & buttons */
      --inp-bg: #ffffff;
      --inp-bdr: #a0a870;
      --inp-focus: #6a8a20;

      /* Semantic colours (node states) */
      --col-active: #e8a000;
      --col-found: #2a8a3a;
      --col-deleted: #c03020;
      --col-trav: #7050b0;
      --col-normal: #2060a0;
      --col-terminal: #1a7a30;

      /* Misc */
      --red: #c03020;
      --green: #1a7a30;
      --yellow: #c88000;
      --purple: #7050b0;
      --blue: #2060a0;
    }

    html {
      font-size: 14px;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--canvas-bg);
      color: var(--sb-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══════════════════════ HEADER ══════════════════════ */
    header {
      background: var(--hdr-bg);
      padding: 6px 10px 5px;
      flex-shrink: 0;
    }

    header h1 {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--hdr-title);
      letter-spacing: .01em;
    }

    /* ══════════════════════ TOOLBAR (top controls) ══════════════════════ */
    .toolbar {
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--toolbar-bdr);
      padding: 4px 8px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }

    .toolbar input[type=text] {
      font-size: .85rem;
      padding: 2px 5px;
      border: 1px solid var(--inp-bdr);
      background: var(--inp-bg);
      width: 110px;
    }

    .toolbar input[type=text]:focus {
      outline: 1px solid var(--inp-focus);
    }

    .toolbar button {
      font-size: .82rem;
      padding: 2px 8px;
      border: 1px solid #888;
      background: #e8e8e8;
      cursor: pointer;
      border-radius: 2px;
    }

    .toolbar button:hover {
      background: #d4d4d4;
    }

    .toolbar button:active {
      background: #c0c0c0;
    }

    .toolbar .sep {
      width: 1px;
      height: 18px;
      background: var(--toolbar-bdr);
      margin: 0 4px;
    }

    .toolbar label {
      font-size: .8rem;
      color: var(--sb-title);
    }

    .toolbar select {
      font-size: .82rem;
      border: 1px solid var(--inp-bdr);
      padding: 2px 4px;
      background: var(--inp-bg);
    }

    /* ══════════════════════ MAIN AREA ══════════════════════ */
    .main-wrap {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ══════════════════════ SIDEBAR ══════════════════════ */
    .sidebar {
      width: 210px;
      flex-shrink: 0;
      background: var(--sb-bg);
      border-right: 1px solid var(--sb-bdr);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      font-size: .8rem;
    }

    .sidebar-section {
      padding: 8px 10px;
      border-bottom: 1px solid var(--sb-bdr);
    }

    .sidebar-section h2 {
      font-size: .72rem;
      font-weight: bold;
      color: var(--sb-title);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 6px;
    }

    /* Input group */
    .input-group {
      display: flex;
      gap: 4px;
      margin-bottom: 6px;
      align-items: center;
    }

    .input-group input {
      flex: 1;
      font-size: .8rem;
      padding: 2px 5px;
      border: 1px solid var(--inp-bdr);
      background: var(--inp-bg);
    }

    .input-group input:focus {
      outline: 1px solid var(--inp-focus);
    }

    /* Buttons */
    .btn {
      font-size: .78rem;
      padding: 2px 8px;
      border: 1px solid #888;
      background: #e8e8e8;
      cursor: pointer;
      border-radius: 2px;
      white-space: nowrap;
      transition: background .1s;
    }

    .btn:hover {
      background: #d4d4d4;
    }

    .btn:active {
      background: #bbb;
    }

    .btn-primary {
      background: #c8d890;
      border-color: #8fa840;
      color: #2a3a08;
    }

    .btn-primary:hover {
      background: #b8ca70;
    }

    .btn-danger {
      background: #f0c8c0;
      border-color: #c05040;
      color: #700;
    }

    .btn-danger:hover {
      background: #e0a898;
    }

    .btn-ghost {
      background: #e8e8e8;
    }

    .btn-sm {
      padding: 1px 6px;
      font-size: .76rem;
    }

    /* Traversal buttons */
    .traversal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .trav-btn {
      font-size: .75rem;
      padding: 4px 4px;
      border: 1px solid #aab870;
      background: #dce8a8;
      color: #2a3a08;
      cursor: pointer;
      text-align: center;
      border-radius: 2px;
      transition: background .1s;
    }

    .trav-btn:hover {
      background: #ccd890;
    }

    .trav-btn.active {
      background: #8fa840;
      color: #fff;
      border-color: #6a8020;
    }

    .trav-btn .trav-icon {
      display: none;
    }

    /* Speed slider */
    .speed-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .speed-wrap label {
      font-size: .74rem;
      color: #555;
      white-space: nowrap;
    }

    input[type=range] {
      flex: 1;
      height: 3px;
      -webkit-appearance: none;
      background: #aaa;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--hdr-bg);
      cursor: pointer;
    }

    /* Word list */
    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      max-height: 90px;
      overflow-y: auto;
    }

    .word-tag {
      background: #e0e8c0;
      border: 1px solid #a0b060;
      border-radius: 3px;
      padding: 1px 6px;
      font-size: .74rem;
      font-family: 'Courier New', monospace;
      color: #2a3a08;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .word-tag:hover {
      border-color: var(--red);
    }

    .word-tag .rm {
      cursor: pointer;
      color: #888;
    }

    .word-tag .rm:hover {
      color: var(--red);
    }

    .word-tag.found {
      border-color: var(--green);
      background: #c8f0c8;
    }

    .word-tag.not-found {
      border-color: var(--red);
      background: #f8d8d0;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }

    .stat-card {
      background: #dce8a8;
      border: 1px solid #aab870;
      border-radius: 3px;
      padding: 4px 6px;
      text-align: center;
    }

    .stat-card .val {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--hdr-bg);
    }

    .stat-card .lbl {
      font-size: .68rem;
      color: #556;
    }

    /* Log */
    .log-box {
      background: #fff;
      border: 1px solid var(--inp-bdr);
      padding: 4px 6px;
      font-family: 'Courier New', monospace;
      font-size: .72rem;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.5;
    }

    .log-line {
      display: block;
    }

    .log-info {
      color: #336;
    }

    .log-ok {
      color: #184818;
    }

    .log-err {
      color: #800;
    }

    .log-warn {
      color: #860;
    }

    .log-trav {
      color: #507;
    }

    /* Presets */
    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .preset-btn {
      font-size: .72rem;
      padding: 2px 6px;
      border: 1px solid #aab870;
      background: #dce8a8;
      color: #2a3a08;
      cursor: pointer;
      border-radius: 2px;
    }

    .preset-btn:hover {
      background: #ccd890;
    }

    /* Traversal result */
    .trav-result {
      margin-top: 4px;
      background: #fff;
      border: 1px solid var(--inp-bdr);
      padding: 4px 6px;
      font-family: 'Courier New', monospace;
      font-size: .74rem;
      color: var(--purple);
      min-height: 26px;
      line-height: 1.5;
      word-break: break-all;
    }

    /* ══════════════════════ CANVAS AREA ══════════════════════ */
    .canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--canvas-bg);
    }

    .canvas-status-bar {
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--toolbar-bdr);
      padding: 2px 8px;
      font-size: .75rem;
      color: #334;
      min-height: 20px;
      flex-shrink: 0;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: var(--canvas-bg);
      border-left: 1px solid var(--canvas-bdr);
    }

    #tst-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }

    #tst-canvas:active {
      cursor: grabbing;
    }

    .canvas-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
      opacity: .35;
    }

    .canvas-empty .big-icon {
      font-size: 4rem;
    }

    .canvas-empty p {
      font-size: .85rem;
      color: #666;
    }

    /* ══════════════════════ BOTTOM ANIM BAR ══════════════════════ */
    .bottom-bar {
      background: var(--toolbar-bg);
      border-top: 1px solid var(--toolbar-bdr);
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .anim-controls {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .anim-controls button {
      font-size: .78rem;
      padding: 1px 8px;
      border: 1px solid #888;
      background: #e0e0e0;
      cursor: pointer;
      border-radius: 2px;
    }

    .anim-controls button:hover {
      background: #ccc;
    }

    .anim-controls button.active-btn {
      background: #c0c0b0;
      font-weight: bold;
    }

    .anim-status {
      font-size: .75rem;
      color: #445500;
      font-weight: bold;
      flex: 1;
      text-align: center;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      max-width: 200px;
    }

    .progress-bar-outer {
      flex: 1;
      height: 3px;
      background: #bbb;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      background: var(--hdr-bg);
      width: 0%;
      transition: width .2s;
    }

    .step-label {
      font-size: .72rem;
      color: #666;
      white-space: nowrap;
    }

    /* Legend strip */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 3px 8px;
      background: #eef2d8;
      border-bottom: 1px solid var(--toolbar-bdr);
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: .7rem;
      color: #334;
    }

    .leg-circle {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      border: 2px solid;
    }

    /* ══════════════════════ FOOTER ══════════════════════ */
    footer {
      background: var(--footer-bg);
      padding: 5px 10px;
      flex-shrink: 0;
    }

    footer a {
      color: var(--footer-link);
      font-size: .8rem;
      text-decoration: underline;
    }

    /* Tooltip */
    #node-tooltip {
      position: fixed;
      background: #fffff0;
      border: 1px solid #8a9a50;
      border-radius: 3px;
      padding: 6px 10px;
      font-size: .75rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity .12s;
      z-index: 200;
      min-width: 140px;
      box-shadow: 2px 2px 6px rgba(0, 0, 0, .25);
      font-family: Arial, sans-serif;
      color: #223;
    }

    #node-tooltip.show {
      opacity: 1;
    }

    #node-tooltip .tt-char {
      font-size: 1rem;
      font-weight: bold;
      margin-bottom: 3px;
      color: var(--hdr-bg);
    }

    #node-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #556;
    }

    #node-tooltip .tt-val {
      color: #112;
      font-family: 'Courier New', monospace;
    }

    /* ══════════════════════ SCROLLBAR ══════════════════════ */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #e8eecc;
    }

    ::-webkit-scrollbar-thumb {
      background: #a0b060;
      border-radius: 3px;
    }
  </style>
</head>

<body>

  <!-- ══════════════════════ HEADER ══════════════════════ -->
  <header>
    <h1>Ternary Search Tree (Trie with BST of children)</h1>
  </header>

  <!-- ══════════════════════ TOP TOOLBAR ══════════════════════ -->
  <div class="toolbar">
    <input id="ins-input" type="text" placeholder="слово…" maxlength="20" autocomplete="off" style="width:90px" />
    <button id="btn-insert">Insert</button>
    <div class="sep"></div>
    <input id="del-input" type="text" placeholder="слово…" maxlength="20" autocomplete="off" style="width:90px" />
    <button id="btn-delete">Delete</button>
    <div class="sep"></div>
    <input id="find-input" type="text" placeholder="слово…" maxlength="20" autocomplete="off" style="width:90px" />
    <button id="btn-find">Find</button>
    <div class="sep"></div>
    <label>Набори:</label>
    <button class="preset-btn" data-set="cat,car,bat,ant,dog">🐾 тварини</button>
    <button class="preset-btn" data-set="apple,avocado,banana,cherry,mango">🍎 фрукти</button>
    <button class="preset-btn" data-set="ab,abc,abcd,b,bc">🔤 abc</button>
    <button class="preset-btn" data-set="she,sells,sea,shells">🐚 shell</button>
    <div class="sep"></div>
    <button id="btn-clear">Clear</button>
  </div>

  <!-- ══════════════════════ SECONDARY TOOLBAR ══════════════════════ -->
  <div class="toolbar" style="background:#eef2d8; border-top:none; border-bottom:1px solid var(--toolbar-bdr);">
    <label>Обходи:</label>
    <button class="trav-btn" id="btn-inorder" data-trav="inorder" style="padding:2px 6px;">Inorder</button>
    <button class="trav-btn" id="btn-preorder" data-trav="preorder" style="padding:2px 6px;">Preorder</button>
    <button class="trav-btn" id="btn-postorder" data-trav="postorder" style="padding:2px 6px;">Postorder</button>
    <button class="trav-btn" id="btn-minmax" data-trav="minmax" style="padding:2px 6px;">Min/Max</button>
    <span id="trav-result"
      style="font-size:.75rem; color:#4a5e1a; font-family:monospace; margin-left:10px; max-width:300px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">—</span>

    <div class="sep" style="margin-left:auto"></div>
    <label>Статистика:</label>
    <span style="font-size:.75rem; margin-right:8px; color:#556;">Слів: <b id="stat-size"
        style="color:var(--hdr-bg)">0</b></span>
    <span style="font-size:.75rem; margin-right:8px; color:#556;">Вузлів: <b id="stat-nodes"
        style="color:var(--hdr-bg)">0</b></span>
    <span style="font-size:.75rem; margin-right:8px; color:#556;">Висота: <b id="stat-height"
        style="color:var(--hdr-bg)">0</b></span>
  </div>

  <!-- ══════════════════════ MAIN WRAP ══════════════════════ -->
  <div class="main-wrap">



    <!-- ══════════════ CANVAS ══════════════ -->
    <div class="canvas-area">
      <!-- status / legend strip -->
      <div class="canvas-status-bar" id="anim-status">Animation Ready</div>
      <div class="legend">
        <div class="legend-item">
          <div class="leg-circle" style="border-color:#2060a0;background:rgba(32,96,160,.15)"></div> Звичайний
        </div>
        <div class="legend-item">
          <div class="leg-circle" style="border-color:#1a7a30;background:rgba(26,122,48,.15)"></div> Термінальний
        </div>
        <div class="legend-item">
          <div class="leg-circle" style="border-color:#c88000;background:rgba(200,128,0,.2)"></div> Активний
        </div>
        <div class="legend-item">
          <div class="leg-circle" style="border-color:#c03020;background:rgba(192,48,32,.15)"></div> Видаляється
        </div>
        <div class="legend-item">
          <div class="leg-circle" style="border-color:#7050b0;background:rgba(112,80,176,.15)"></div> Обхід
        </div>
      </div>

      <div class="canvas-wrap">
        <!-- SVG Canvas -->
        <svg id="tst-canvas" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow-normal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#888" />
            </marker>
            <marker id="arrow-mid" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
              <path d="M0,0 L0,6 L8,3 z" fill="#2060a0" />
            </marker>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2.5" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <g id="tree-group"></g>
        </svg>

        <!-- Empty state -->
        <div class="canvas-empty" id="empty-hint">
          <div class="big-icon">🌱</div>
          <p>Вставте перше слово, щоб побудувати дерево</p>
        </div>
      </div>

      <!-- ══ BOTTOM ANIM BAR ══ -->
      <div class="bottom-bar">
        <div class="anim-controls">
          <button id="btn-step-back" title="Skip Back">Skip Back</button>
          <button id="btn-step-back2" title="Step Back">Step Back</button>
          <button id="btn-pause" class="active-btn" title="Pause">Pause</button>
          <button id="btn-step-fwd" title="Step Forward">Step Forward</button>
          <button id="btn-step-fwd2" title="Skip Forward">Skip Forward</button>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar-outer">
            <div class="progress-bar-inner" id="progress-bar"></div>
          </div>
          <span class="step-label" id="step-label">—</span>
        </div>
        <!-- Animation speed moved here -->
        <div class="speed-wrap" style="display:flex; align-items:center; gap:6px; margin-left:10px;">
          <label style="font-size:.74rem;">Slow</label>
          <input type="range" id="speed-range" min="100" max="1500" value="700"
            style="width:100px; height:3px; background:#aaa; -webkit-appearance:none; border-radius:2px;" />
          <label style="font-size:.74rem;">Fast</label>
        </div>
        <button class="btn btn-ghost btn-sm" id="btn-fit" style="margin-left:auto">Fit</button>
      </div>
    </div>

  </div>

  <!-- ══════════════════════ FOOTER ══════════════════════ -->
  <footer>
    <a href="https://www.cs.usfca.edu/~galles/visualization/Algorithms.html" target="_blank">Algorithm
      Visualizations</a>
  </footer>

  <div id="node-tooltip">
    <div class="tt-char" id="tt-char"></div>
    <div class="tt-row"><span>Термінальний</span><span class="tt-val" id="tt-terminal"></span></div>
    <div class="tt-row"><span>Left</span><span class="tt-val" id="tt-left"></span></div>
    <div class="tt-row"><span>Mid</span><span class="tt-val" id="tt-mid"></span></div>
    <div class="tt-row"><span>Right</span><span class="tt-val" id="tt-right"></span></div>
    <div class="tt-row"><span>Глибина</span><span class="tt-val" id="tt-depth"></span></div>
  </div>

  <!-- ═══════════════════════════════ SCRIPT ══════════════════════════════════ -->
  <script>
    'use strict';

    /* ────────────────────────── TST IMPLEMENTATION ────────────────────────── */
    class TSTNode {
      constructor(char) {
        this.char = char;
        this.is_terminal = false;
        this.left = this.mid = this.right = null;
        // layout
        this.x = 0; this.y = 0; this.id = TSTNode._id++;
      }
    }
    TSTNode._id = 0;

    class TernarySearchTree {
      constructor() { this._root = null; this._count = 0; }

      insert(value) {
        if (!value) throw new Error('Значення не може бути порожнім рядком.');
        if (!this.search(value)) this._count++;
        this._root = this._insert(this._root, value, 0);
      }
      _insert(node, value, depth) {
        const ch = value[depth];
        if (!node) node = new TSTNode(ch);
        if (ch < node.char) node.left = this._insert(node.left, value, depth);
        else if (ch > node.char) node.right = this._insert(node.right, value, depth);
        else if (depth + 1 < value.length) node.mid = this._insert(node.mid, value, depth + 1);
        else node.is_terminal = true;
        return node;
      }

      search(value) {
        const node = this._find(this._root, value, 0);
        return node !== null && node.is_terminal;
      }
      _find(node, value, depth) {
        if (!node) return null;
        const ch = value[depth];
        if (ch < node.char) return this._find(node.left, value, depth);
        if (ch > node.char) return this._find(node.right, value, depth);
        if (depth + 1 === value.length) return node;
        return this._find(node.mid, value, depth + 1);
      }

      delete(value) {
        if (!value) return;
        const [was, root] = this._delete(this._root, value, 0);
        this._root = root;
        if (was) this._count--;
      }
      _delete(node, value, depth) {
        if (!node) return [false, null];
        const ch = value[depth];
        let was = false;
        if (ch < node.char) { [was, node.left] = this._delete(node.left, value, depth); }
        else if (ch > node.char) { [was, node.right] = this._delete(node.right, value, depth); }
        else if (depth + 1 < value.length) { [was, node.mid] = this._delete(node.mid, value, depth + 1); }
        else if (node.is_terminal) { node.is_terminal = false; was = true; }
        if (was && !node.is_terminal && !node.mid && !node.left && !node.right)
          return [was, null];
        return [was, node];
      }

      inorder() { const r = []; this._inorder(this._root, [], r); return r; }
      _inorder(node, stack, r) {
        if (!node) return;
        this._inorder(node.left, stack, r);
        stack.push(node.char);
        this._inorder(node.mid, stack, r);   // mid ДО слова
        if (node.is_terminal) r.push(stack.join(''));  // слово ПІСЛЯ mid
        stack.pop();
        this._inorder(node.right, stack, r);
      }

      preorder() { const r = []; this._preorder(this._root, [], r); return r; }
      _preorder(node, stack, r) {
        if (!node) return;
        this._preorder(node.left, stack, r);
        stack.push(node.char);
        if (node.is_terminal) r.push(stack.join(''));
        this._preorder(node.mid, stack, r);
        stack.pop();
        this._preorder(node.right, stack, r);
      }

      postorder() { const r = []; this._postorder(this._root, [], r); return r; }
      _postorder(node, stack, r) {
        if (!node) return;
        this._postorder(node.left, stack, r);
        stack.push(node.char);
        this._postorder(node.mid, stack, r);
        stack.pop();
        this._postorder(node.right, stack, r);
        stack.push(node.char);
        if (node.is_terminal) r.push(stack.join(''));
        stack.pop();
      }

      min() {
        if (!this._root) throw new Error('Дерево порожнє.');
        return this._extreme(this._root, [], true);
      }
      max() {
        if (!this._root) throw new Error('Дерево порожнє.');
        return this._extreme(this._root, [], false);
      }
      _extreme(node, stack, preferLeft) {
        if (!node) return null;
        const [prim, sec] = preferLeft ? [node.left, node.right] : [node.right, node.left];
        const r = this._extreme(prim, stack, preferLeft);
        if (r !== null) return r;
        stack.push(node.char);
        const midR = this._extreme(node.mid, stack, preferLeft);
        const val = midR !== null ? midR : (node.is_terminal ? stack.join('') : null);
        stack.pop();
        return val !== null ? val : this._extreme(sec, stack, preferLeft);
      }

      height() {
        const h = n => !n ? 0 : 1 + Math.max(h(n.left), h(n.mid), h(n.right));
        return h(this._root);
      }
      size() { return this._count; }
      is_empty() { return this._count === 0; }
      clear() { this._root = null; this._count = 0; }

      countNodes() { const c = n => !n ? 0 : 1 + c(n.left) + c(n.mid) + c(n.right); return c(this._root); }
    }

    /* ────────────────────────── VISUALIZER STATE ────────────────────────── */
    const tst = new TernarySearchTree();
    let animSteps = [];  // {nodeId, state, message}
    let stepIdx = -1;
    let animPaused = false;
    let animTimer = null;
    let highlightMap = {}; // nodeId → state ('active'|'found'|'deleted'|'traversed')
    let currentHidden = new Set();
    let panX = 0, panY = 0, scale = 1;
    let isPanning = false, lastPan = {};

    /* ───────────────────────── LAYOUT ALGORITHM ─────────────────────────── */
    const NODE_R = 26;
    const H_GAP = 50;  // horizontal gap between BST siblings
    const V_MID = 90;  // vertical gap going down mid

    function layoutTree(root) {
      if (!root) return;
      // Assign x,y positions via post-order calculation
      positionNode(root, 0, 0, 0);
      // Center tree horizontally based on exact bounding box
      const svgW = svg.getBoundingClientRect().width || window.innerWidth || 800;
      let minX = Infinity, maxX = -Infinity;
      collectNodes(root).forEach(n => {
        minX = Math.min(minX, n.x);
        maxX = Math.max(maxX, n.x);
      });
      const treeCenterX = (minX + maxX) / 2;
      const dx = (svgW / 2) - treeCenterX;
      const dy = 60 - root.y;
      collectNodes(root).forEach(n => { n.x += dx; n.y += dy; });
    }

    // Returns the subtree width
    function positionNode(node, x, y, depth) {
      if (!node) return 0;
      node.x = x; node.y = y;

      // Place mid children below (deeper in word)
      let midW = positionNode(node.mid, x, y + V_MID, depth + 1);

      // left/right siblings placed to the sides
      let leftW = positionNode(node.left, x - H_GAP - Math.max(midW / 2, NODE_R), y, depth);
      let rightW = positionNode(node.right, x + H_GAP + Math.max(midW / 2, NODE_R), y, depth);

      return Math.max(leftW + rightW + H_GAP * 2, NODE_R * 2);
    }

    function collectNodes(root) {
      const res = [];
      const dfs = n => { if (!n) return; res.push(n); dfs(n.left); dfs(n.mid); dfs(n.right); };
      dfs(root);
      return res;
    }

    function fitToCanvas() {
      if (!tst._root) { panX = 0; panY = 0; scale = 1; applyTransform(); return; }
      const nodes = collectNodes(tst._root);
      if (nodes.length === 0) return;
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      nodes.forEach(n => {
        if (currentHidden.has(n.id)) return;
        minX = Math.min(minX, n.x - NODE_R);
        maxX = Math.max(maxX, n.x + NODE_R);
        minY = Math.min(minY, n.y - NODE_R);
        maxY = Math.max(maxY, n.y + NODE_R);
      });
      const treeW = maxX - minX;
      const treeH = maxY - minY;
      if (treeW === 0 || treeH === 0) { panX = 0; panY = 0; scale = 1; applyTransform(); return; }
      const svgRect = svg.getBoundingClientRect();
      const svgW = svgRect.width || 800;
      const svgH = svgRect.height || 500;
      const padding = 40;
      const fillFactor = 0.4;  // tree fills ~40% of each axis → ~15% of area
      const scaleX = (svgW - padding * 2) * fillFactor / treeW;
      const scaleY = (svgH - padding * 2) * fillFactor / treeH;
      scale = Math.min(scaleX, scaleY, 1.2);  // cap at 1.2x
      scale = Math.max(scale, 0.15);           // floor at 0.15x
      const treeCX = (minX + maxX) / 2;
      const treeCY = (minY + maxY) / 2;
      panX = svgW / 2 - treeCX * scale;
      panY = svgH * 0.35 - treeCY * scale;  // 35% from top instead of center
      applyTransform();
    }

    /* ───────────────────────── RENDER ───────────────────────── */
    const svg = document.getElementById('tst-canvas');
    const group = document.getElementById('tree-group');
    const emptyHint = document.getElementById('empty-hint');
    const tooltip = document.getElementById('node-tooltip');

    function stateColor(node) {
      const st = highlightMap[node.id];
      if (st === 'active') return { fill: '#ffeb3b', stroke: '#c88000', glow: true, text: '#222' };
      if (st === 'found') return { fill: '#81c784', stroke: '#2e7d32', glow: true, text: '#222' };
      if (st === 'deleted') return { fill: '#e57373', stroke: '#c62828', glow: true, text: '#222' };
      if (st === 'traversed') return { fill: '#ce93d8', stroke: '#6a1b9a', glow: true, text: '#222' };
      if (node.is_terminal) return { fill: '#a5d6a7', stroke: '#2e7d32', glow: false, text: '#006400' };
      return { fill: '#e8f5e9', stroke: '#2e7d32', glow: false, text: '#006400' };
    }

    function renderTree() {
      group.innerHTML = '';
      emptyHint.style.display = tst._root ? 'none' : 'flex';
      if (!tst._root) return;

      layoutTree(tst._root);

      const nodes = collectNodes(tst._root);

      // Draw edges first
      nodes.forEach(node => {
        if (currentHidden.has(node.id)) return;
        const drawEdge = (child, isMid) => {
          if (!child || currentHidden.has(child.id)) return;
          const dx = child.x - node.x;
          const dy = child.y - node.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist === 0) return;
          const nx = dx / dist, ny = dy / dist;
          const x1 = node.x + nx * NODE_R, y1 = node.y + ny * NODE_R;
          const x2 = child.x - nx * NODE_R, y2 = child.y - ny * NODE_R;

          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', x1); line.setAttribute('y1', y1);
          line.setAttribute('x2', x2); line.setAttribute('y2', y2);
          line.setAttribute('stroke', isMid ? '#2e7d32' : 'rgba(80,80,80,.4)');
          line.setAttribute('stroke-width', isMid ? 2 : 1.2);
          // Only standard lines get arrows. Mid lines get no arrow head if we want to mimic image 1 perfectly, but let's keep green arrows.
          line.setAttribute('marker-end', isMid ? 'url(#arrow-mid)' : 'url(#arrow-normal)');
          group.appendChild(line);

          // Label for mid
          if (isMid) {
            const mx = (node.x + child.x) / 2 + 6;
            const my = (node.y + child.y) / 2 + 4;
            const lbl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            lbl.setAttribute('x', mx); lbl.setAttribute('y', my);
            lbl.setAttribute('fill', '#2e7d32');
            lbl.setAttribute('font-size', '12');
            lbl.setAttribute('font-family', 'JetBrains Mono, monospace');
            lbl.textContent = '=' + child.char;
            group.appendChild(lbl);
          }
        };
        drawEdge(node.left, false);
        drawEdge(node.right, false);
        drawEdge(node.mid, true);
      });

      // Draw nodes
      nodes.forEach(node => {
        if (currentHidden.has(node.id)) return;
        const col = stateColor(node);

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', node.x); circle.setAttribute('cy', node.y);
        circle.setAttribute('r', NODE_R);
        circle.setAttribute('fill', col.fill);
        circle.setAttribute('stroke', col.stroke);
        circle.setAttribute('stroke-width', col.glow ? 2.5 : 1.5);
        if (col.glow) circle.setAttribute('filter', 'url(#glow)');

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', node.x); text.setAttribute('y', node.y + 4);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', col.text);
        text.setAttribute('font-size', '14');
        text.setAttribute('font-weight', 'bold');
        text.setAttribute('font-family', 'Arial, Helvetica, sans-serif');
        text.textContent = node.char;

        // Terminal dot
        if (node.is_terminal) {
          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.setAttribute('cx', node.x + NODE_R - 5);
          dot.setAttribute('cy', node.y - NODE_R + 5);
          dot.setAttribute('r', 5);
          dot.setAttribute('fill', '#34d399');
          group.appendChild(dot);
        }

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('data-id', node.id);
        g.style.cursor = 'pointer';
        g.appendChild(circle);
        g.appendChild(text);
        group.appendChild(g);

        // Hover
        g.addEventListener('mouseenter', e => showTooltip(node, e));
        g.addEventListener('mousemove', e => moveTooltip(e));
        g.addEventListener('mouseleave', hideTooltip);
      });

      updateStats();
      fitToCanvas();
    }

    function showTooltip(node, e) {
      document.getElementById('tt-char').textContent = `'${node.char}'`;
      document.getElementById('tt-terminal').textContent = node.is_terminal ? '✓ так' : '✗ ні';
      document.getElementById('tt-left').textContent = node.left ? `'${node.left.char}'` : 'null';
      document.getElementById('tt-mid').textContent = node.mid ? `'${node.mid.char}'` : 'null';
      document.getElementById('tt-right').textContent = node.right ? `'${node.right.char}'` : 'null';
      // Compute depth
      const walk = (n, target, depth) => {
        if (!n) return -1;
        if (n === target) return depth;
        let r = walk(n.left, target, depth);
        if (r !== -1) return r;
        r = walk(n.mid, target, depth + 1);
        if (r !== -1) return r;
        return walk(n.right, target, depth);
      };
      const computedDepth = walk(tst._root, node, 0);
      document.getElementById('tt-depth').textContent = computedDepth !== -1 ? computedDepth : '?';
      tooltip.classList.add('show');
      moveTooltip(e);
    }
    function moveTooltip(e) {
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 10) + 'px';
    }
    function hideTooltip() { tooltip.classList.remove('show'); }

    /* ───────────────────────── STATS ───────────────────────── */
    function updateStats() {
      if (document.getElementById('stat-size')) document.getElementById('stat-size').textContent = tst.size();
      if (document.getElementById('stat-nodes')) document.getElementById('stat-nodes').textContent = tst.countNodes();
      if (document.getElementById('stat-height')) document.getElementById('stat-height').textContent = tst.height();
    }

    function updateWordList() {
      // Stubbed out after removing sidebar
    }

    /* ───────────────────────── LOG ───────────────────────── */
    function log(msg, cls = 'log-info') {
      console.log(`[${cls}] ${msg}`);
    }

    /* ───────────────────────── ANIMATION ENGINE ─────────────────────────── */
    function setStatus(msg) { document.getElementById('anim-status').textContent = msg; }
    function setProgress(cur, total) {
      const pct = total > 0 ? Math.round(cur / total * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      document.getElementById('step-label').textContent = total > 0 ? `${cur}/${total}` : '—';
    }

    let pendingAction = null;

    function animateSteps(steps, onDone) {
      animSteps = steps;
      stepIdx = -1;
      animPaused = false;
      setProgress(0, steps.length);
      document.getElementById('btn-pause').textContent = '⏸';

      const speed = () => 1600 - parseInt(document.getElementById('speed-range').value);

      const tick = () => {
        if (animPaused) return;
        stepIdx++;
        if (stepIdx >= animSteps.length) {
          setProgress(animSteps.length, animSteps.length);
          setStatus('✓ Анімація завершена');
          if (onDone) onDone();
          return;
        }
        applyStep(stepIdx);
        animTimer = setTimeout(tick, speed());
      };
      tick();
    }

    function applyStep(idx) {
      if (idx < 0 || idx >= animSteps.length) return;
      const step = animSteps[idx];
      highlightMap = {};
      // Apply all states up to this step (so previous visited nodes stay a bit)
      for (let i = Math.max(0, idx - 3); i <= idx; i++) {
        const s = animSteps[i];
        if (s.nodeId !== undefined) highlightMap[s.nodeId] = s.state;
      }
      currentHidden = new Set(step.hidden || []);
      renderTree();
      setStatus(step.message || '');
      setProgress(idx + 1, animSteps.length);
    }

    function cancelAnim() {
      clearTimeout(animTimer);
      animTimer = null;
      highlightMap = {};
      currentHidden = new Set();
      if (pendingAction) {
        pendingAction();
        pendingAction = null;
      }
    }

    document.getElementById('btn-pause').addEventListener('click', () => {
      animPaused = !animPaused;
      document.getElementById('btn-pause').textContent = animPaused ? '▶' : '⏸';
      if (!animPaused) {
        const speed = 1600 - parseInt(document.getElementById('speed-range').value);
        animTimer = setTimeout(() => {
          animPaused = false;
          // re-enter tick
          const tick = () => {
            if (animPaused) return;
            stepIdx++;
            if (stepIdx >= animSteps.length) { setStatus('✓ Завершено'); return; }
            applyStep(stepIdx);
            animTimer = setTimeout(tick, 1600 - parseInt(document.getElementById('speed-range').value));
          };
          tick();
        }, speed);
      }
    });
    document.getElementById('btn-step-back').addEventListener('click', () => {
      animPaused = true;
      document.getElementById('btn-pause').textContent = '▶';
      stepIdx = Math.max(-1, stepIdx - 1);
      if (stepIdx >= 0) applyStep(stepIdx);
      else { highlightMap = {}; renderTree(); setProgress(0, animSteps.length); }
    });
    document.getElementById('btn-step-fwd').addEventListener('click', () => {
      animPaused = true;
      document.getElementById('btn-pause').textContent = '▶';
      stepIdx = Math.min(animSteps.length - 1, stepIdx + 1);
      if (stepIdx >= 0) applyStep(stepIdx);
    });

    /* ───────────────────────── INSERT ANIMATION ─────────────────────────── */
    /* ───────────────────────── INSERT ANIMATION ─────────────────────────── */
    function buildInsertSteps(value, oldNodeIds) {
      const steps = [];
      const hidden = new Set(collectNodes(tst._root).map(n => n.id).filter(id => !oldNodeIds.has(id)));

      const pushStep = (nodeId, state, message) => {
        steps.push({ nodeId, state, message, hidden: Array.from(hidden) });
      };

      const walk = (node, depth) => {
        if (!node) return;
        const ch = value[depth];

        if (hidden.has(node.id)) {
          hidden.delete(node.id);
          pushStep(node.id, 'active', `_insert: node is None. Створюємо TSTNode('${ch}')`);
        } else {
          pushStep(node.id, 'active', `_insert: перевіряємо вузол '${node.char}' з символом '${ch}'`);
        }

        if (ch < node.char) {
          pushStep(node.id, 'active', `_insert: '${ch}' < '${node.char}'. Виклик _insert(node.left)`);
          walk(node.left, depth);
        } else if (ch > node.char) {
          pushStep(node.id, 'active', `_insert: '${ch}' > '${node.char}'. Виклик _insert(node.right)`);
          walk(node.right, depth);
        } else {
          if (depth + 1 < value.length) {
            pushStep(node.id, 'active', `_insert: '${ch}' == '${node.char}'. Виклик _insert(node.mid)`);
            walk(node.mid, depth + 1);
          } else {
            pushStep(node.id, 'found', `_insert: Останній символ. Встановлюємо is_terminal = True.`);
          }
        }
      };

      steps.push({ message: `Починаємо вставку "${value}"`, hidden: Array.from(hidden) });
      walk(tst._root, 0);
      return steps;
    }

    function doInsert(val) {
      cancelAnim();
      val = val.trim().toLowerCase();
      if (!val) return;
      const exists = tst.search(val);
      const oldNodeIds = new Set(collectNodes(tst._root).map(n => n.id));

      tst.insert(val);
      const steps = buildInsertSteps(val, oldNodeIds);

      log(exists ? `"${val}" вже існує (повторна вставка)` : `Вставлено "${val}"`, exists ? 'log-warn' : 'log-ok');
      animateSteps(steps, () => { highlightMap = {}; currentHidden = new Set(); renderTree(); });
    }

    /* ───────────────────────── SEARCH ANIMATION ─────────────────────────── */
    function buildSearchSteps(value) {
      const steps = [];
      const walk = (node, depth) => {
        if (!node) { steps.push({ message: `_find: node is None -> Повертаємо None ✗` }); return; }
        const ch = value[depth];
        if (!ch) return;

        steps.push({ nodeId: node.id, state: 'active', message: `_find: перевіряємо вузол '${node.char}' з символом '${ch}'` });

        if (ch < node.char) {
          steps.push({ nodeId: node.id, state: 'active', message: `_find: '${ch}' < '${node.char}'. Виклик _find(node.left)` });
          walk(node.left, depth);
        } else if (ch > node.char) {
          steps.push({ nodeId: node.id, state: 'active', message: `_find: '${ch}' > '${node.char}'. Виклик _find(node.right)` });
          walk(node.right, depth);
        } else if (depth + 1 === value.length) {
          steps.push({
            nodeId: node.id, state: node.is_terminal ? 'found' : 'active',
            message: `_find: кінець слова. Повертаємо вузол. is_terminal=${node.is_terminal ? 'True ✓' : 'False ✗'}`
          });
        } else {
          steps.push({ nodeId: node.id, state: 'active', message: `_find: '${ch}' == '${node.char}'. Виклик _find(node.mid)` });
          walk(node.mid, depth + 1);
        }
      };
      steps.push({ message: `Виклик _find(root, "${value}", 0)` });
      walk(tst._root, 0);
      return steps;
    }

    function doSearch(val) {
      cancelAnim();
      val = val.trim().toLowerCase();
      if (!val || !tst._root) { log('"' + val + '" не знайдено (дерево порожнє)', 'log-err'); return; }
      const found = tst.search(val);
      const steps = buildSearchSteps(val);
      log(`Пошук "${val}" → ${found ? 'ЗНАЙДЕНО ✓' : 'не знайдено ✗'}`, found ? 'log-ok' : 'log-err');
      document.querySelectorAll('.word-tag').forEach(t => {
        if (t.querySelector('span').textContent === val) {
          t.classList.add(found ? 'found' : 'not-found');
          setTimeout(() => t.classList.remove('found', 'not-found'), 2000);
        }
      });
      animateSteps(steps, () => { highlightMap = {}; renderTree(); });
    }

    /* ───────────────────────── DELETE ANIMATION ─────────────────────────── */
    function buildDeleteSteps(value) {
      const steps = [];
      const walk = (node, depth) => {
        if (!node) { steps.push({ message: `_delete: node is None -> Повертаємо False, None` }); return false; }
        const ch = value[depth];

        steps.push({ nodeId: node.id, state: 'active', message: `_delete: перевіряємо вузол '${node.char}' з символом '${ch}'` });

        let was_deleted = false;
        let pName = '';
        if (ch < node.char) {
          steps.push({ nodeId: node.id, state: 'active', message: `_delete: '${ch}' < '${node.char}'. Виклик _delete(node.left)` });
          was_deleted = walk(node.left, depth);
          pName = 'left';
        } else if (ch > node.char) {
          steps.push({ nodeId: node.id, state: 'active', message: `_delete: '${ch}' > '${node.char}'. Виклик _delete(node.right)` });
          was_deleted = walk(node.right, depth);
          pName = 'right';
        } else if (depth + 1 < value.length) {
          steps.push({ nodeId: node.id, state: 'active', message: `_delete: '${ch}' == '${node.char}'. Виклик _delete(node.mid)` });
          was_deleted = walk(node.mid, depth + 1);
          pName = 'mid';
        } else if (node.is_terminal) {
          steps.push({ nodeId: node.id, state: 'deleted', message: `_delete: знайдено термінальний вузол! is_terminal = False, was_deleted = True` });
          was_deleted = true;
        } else {
          steps.push({ nodeId: node.id, state: 'active', message: `_delete: вузол не термінальний. was_deleted = False` });
        }

        // At this point in recursion, the child has already been pruned if it returned None in python.
        // We can just rely on the final state of the tree after delete. 
        // We mark node as visited during back-propagation to simulate python returning.
        if (was_deleted) {
          steps.push({ nodeId: node.id, state: 'deleted', message: `_delete повертається у вузол '${node.char}'. was_deleted = True.` });
        }
        return was_deleted;
      };
      steps.push({ message: `Виклик _delete(root, "${value}", 0)` });
      walk(tst._root, 0);
      return steps;
    }

    function doDelete(val) {
      cancelAnim();
      val = val.trim().toLowerCase();
      if (!val) return;
      const existed = tst.search(val);
      const steps = buildDeleteSteps(val);

      pendingAction = () => {
        if (existed) tst.delete(val);
      };

      log(existed ? `Видалено "${val}"` : `"${val}" не знайдено`, existed ? 'log-warn' : 'log-err');
      animateSteps(steps, () => { cancelAnim(); renderTree(); });
    }

    /* ───────────────────────── TRAVERSAL ANIMATION ─────────────────────────── */
    function buildTraversalSteps(type) {
      const steps = [];
      if (type === 'inorder') {
        const visit = (node, stack) => {
          if (!node) return;
          steps.push({ nodeId: node.id, state: 'active', message: `_inorder: вузол '${node.char}', виклик _inorder(left)` });
          visit(node.left, stack);
          stack.push(node.char);
          steps.push({ nodeId: node.id, state: 'active', message: `_inorder: вузол '${node.char}', stack.append. виклик _inorder(mid)` });
          visit(node.mid, stack);   // mid ДО слова
          steps.push({ nodeId: node.id, state: 'traversed', message: `_inorder: вузол '${node.char}', після mid. ${node.is_terminal ? 'is_terminal=True -> зібрано: "' + stack.join('') + '"' : 'is_terminal=False'}` });
          stack.pop();
          steps.push({ nodeId: node.id, state: 'active', message: `_inorder: вузол '${node.char}', stack.pop. виклик _inorder(right)` });
          visit(node.right, stack);
        };
        visit(tst._root, []);
      } else if (type === 'preorder') {
        const visit = (node, stack) => {
          if (!node) return;
          steps.push({ nodeId: node.id, state: 'active', message: `_preorder: вузол '${node.char}', виклик _preorder(left)` });
          visit(node.left, stack);
          stack.push(node.char);
          steps.push({ nodeId: node.id, state: 'traversed', message: `_preorder: вузол '${node.char}', stack.append. ${node.is_terminal ? 'is_terminal=True -> зібрано: "' + stack.join('') + '"' : ''}` });
          steps.push({ nodeId: node.id, state: 'active', message: `_preorder: вузол '${node.char}', виклик _preorder(mid)` });
          visit(node.mid, stack);
          stack.pop();
          steps.push({ nodeId: node.id, state: 'active', message: `_preorder: вузол '${node.char}', stack.pop. виклик _preorder(right)` });
          visit(node.right, stack);
        };
        visit(tst._root, []);
      } else if (type === 'postorder') {
        const visit = (node, stack) => {
          if (!node) return;
          steps.push({ nodeId: node.id, state: 'active', message: `_postorder: вузол '${node.char}', виклик _postorder(left)` });
          visit(node.left, stack);
          stack.push(node.char);
          steps.push({ nodeId: node.id, state: 'active', message: `_postorder: вузол '${node.char}', stack.append. виклик _postorder(mid)` });
          visit(node.mid, stack);
          stack.pop();
          steps.push({ nodeId: node.id, state: 'active', message: `_postorder: вузол '${node.char}', stack.pop. виклик _postorder(right)` });
          visit(node.right, stack);
          stack.push(node.char);
          steps.push({ nodeId: node.id, state: 'traversed', message: `_postorder: вузол '${node.char}', stack.append. ${node.is_terminal ? 'is_terminal=True -> зібрано: "' + stack.join('') + '"' : ''}` });
          stack.pop();
        };
        visit(tst._root, []);
      } else if (type === 'minmax') {
        const minW = tst.is_empty() ? null : tst.min();
        const maxW = tst.is_empty() ? null : tst.max();

        const walkExtreme = (node, stack, preferLeft) => {
          if (!node) return null;
          const pName = preferLeft ? 'left' : 'right';
          const sName = preferLeft ? 'right' : 'left';

          steps.push({ nodeId: node.id, state: 'active', message: `_extreme: вузол '${node.char}'. Виклик _extreme(${pName})` });

          const primRes = walkExtreme(preferLeft ? node.left : node.right, stack, preferLeft);
          if (primRes !== null) {
            steps.push({ nodeId: node.id, state: 'found', message: `_extreme: повернуто результат з ${pName} гілки: "${primRes}"` });
            return primRes;
          }

          stack.push(node.char);
          steps.push({ nodeId: node.id, state: 'traversed', message: `_extreme: ${pName} == None. stack.append('${node.char}'). Виклик _extreme(mid)` });

          const midRes = walkExtreme(node.mid, stack, preferLeft);
          const value = midRes !== null ? midRes : (node.is_terminal ? stack.join('') : null);

          stack.pop();

          if (value !== null) {
            steps.push({ nodeId: node.id, state: 'found', message: `_extreme: знайдено значення по центру (mid або is_terminal): "${value}"` });
            return value;
          }

          steps.push({ nodeId: node.id, state: 'active', message: `_extreme: mid_result порожній і is_terminal=False. Виклик _extreme(${sName})` });
          return walkExtreme(preferLeft ? node.right : node.left, stack, preferLeft);
        };

        steps.push({ message: `=== Пошук Мінімуму (prefer_left=True) ===` });
        walkExtreme(tst._root, [], true);

        steps.push({ message: `=== Пошук Максимуму (prefer_left=False) ===` });
        walkExtreme(tst._root, [], false);

        if (minW || maxW) steps.push({ message: `Min = "${minW || '-'}", Max = "${maxW || '-'}"` });
      }
      return steps;
    }

    document.querySelectorAll('.trav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        cancelAnim();
        if (tst.is_empty()) { log('Дерево порожнє', 'log-err'); return; }
        document.querySelectorAll('.trav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const type = btn.dataset.trav;
        let result = '';
        if (type === 'inorder') result = tst.inorder().join(', ');
        if (type === 'preorder') result = tst.preorder().join(', ');
        if (type === 'postorder') result = tst.postorder().join(', ');
        if (type === 'minmax') result = `Min: ${tst.min()}  |  Max: ${tst.max()}`;
        document.getElementById('trav-result').textContent = result;
        log(`[${type}]: ${result}`, 'log-trav');
        const steps = buildTraversalSteps(type);
        animateSteps(steps, () => { highlightMap = {}; renderTree(); document.querySelectorAll('.trav-btn').forEach(b => b.classList.remove('active')); });
      });
    });

    /* ───────────────────────── PAN & ZOOM ───────────────────────────── */
    function applyTransform() {
      group.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
    }
    svg.addEventListener('mousedown', e => {
      if (e.target.closest('[data-id]')) return;
      isPanning = true; lastPan = { x: e.clientX, y: e.clientY };
    });
    window.addEventListener('mousemove', e => {
      if (!isPanning) return;
      panX += e.clientX - lastPan.x; panY += e.clientY - lastPan.y;
      lastPan = { x: e.clientX, y: e.clientY };
      applyTransform();
    });
    window.addEventListener('mouseup', () => { isPanning = false; });
    svg.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      scale = Math.min(3, Math.max(0.2, scale * delta));
      applyTransform();
    }, { passive: false });

    document.getElementById('btn-fit').addEventListener('click', () => {
      fitToCanvas();
    });

    /* ───────────────────────── CONTROLS ───────────────────────── */
    function handleInsert() {
      const v = document.getElementById('ins-input').value;
      if (v.trim()) { doInsert(v); document.getElementById('ins-input').value = ''; }
    }
    document.getElementById('btn-insert').addEventListener('click', handleInsert);
    document.getElementById('ins-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleInsert(); });

    document.getElementById('btn-find').addEventListener('click', () => {
      doSearch(document.getElementById('find-input').value);
    });
    document.getElementById('find-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(e.target.value); });

    document.getElementById('btn-delete').addEventListener('click', () => {
      doDelete(document.getElementById('del-input').value);
      document.getElementById('del-input').value = '';
    });
    document.getElementById('del-input').addEventListener('keydown', e => { if (e.key === 'Enter') { doDelete(e.target.value); e.target.value = ''; } });

    document.getElementById('btn-clear').addEventListener('click', () => {
      cancelAnim(); tst.clear();
      log('Дерево очищено', 'log-warn');
      document.getElementById('trav-result').textContent = '—';
      renderTree();
    });

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        cancelAnim(); tst.clear();
        const words = btn.dataset.set.split(',');
        words.forEach(w => tst.insert(w));
        log(`Завантажено набір: ${words.join(', ')}`, 'log-ok');
        renderTree();
      });
    });

    /* ───────────────────────── INIT ───────────────────────── */
    log('TST Visualizer запущено', 'log-ok');
    renderTree();
    applyTransform();
  </script>
</body>

</html>
